name: Secret Scan Guard

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  secret-scan:
    name: Scan for exposed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so we can scan all new commits

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Block if .env files present in tree
        shell: bash
        run: |
          echo "Checking for .env files in the repository tree..."
          # Find any .env files tracked by git
          ENV_FILES=$(git ls-files | grep -E '(^|/)\.env(\.|$)' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::SECURITY: .env file(s) found in git tree:"
            echo "$ENV_FILES"
            exit 1
          fi
          echo "No .env files found in git tree. ✓"

      - name: Block known secret patterns in latest commits
        shell: bash
        run: |
          echo "Scanning staged/committed content for secret patterns..."
          PATTERNS=(
            'sk-or-v[0-9]-[0-9a-f]{60,}'
            'AIzaSy[0-9A-Za-z_-]{33}'
            'rzp_live_[A-Za-z0-9]{14,}'
            'AKIA[0-9A-Z]{16}'
            'ghp_[A-Za-z0-9]{36}'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCH=$(git log -p --since="1 day ago" --all | grep -oE "\+.*${pattern}" | head -1 || true)
            if [ -n "$MATCH" ]; then
              echo "::error::Secret pattern detected in recent commits: ${pattern}"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No secret patterns found. ✓"
